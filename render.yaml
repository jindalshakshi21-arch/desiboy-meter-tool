services:
  - type: web
    name: desiboy-meter-tool
    env: node
    plan: free
    buildCommand: bash build.sh
    startCommand: node artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
