services:
  - type: web
    name: desiboy-meter-tool
    env: node
    plan: free
    buildCommand: >
      corepack enable &&
      corepack prepare pnpm@latest --activate &&
      pnpm install --frozen-lockfile &&
      PORT=3000 BASE_PATH=/ pnpm --filter @workspace/toolhub run build &&
      mkdir -p artifacts/api-server/public &&
      cp -r artifacts/toolhub/dist/. artifacts/api-server/public/ &&
      pnpm --filter @workspace/api-server run build
    startCommand: node artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
